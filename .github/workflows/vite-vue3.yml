name: vite-vue3-cicd

on:
  push:
    tags:
      - 'vite-vue3@*'
  workflow_dispatch:
    inputs:
      version:
        description: 'vite-vue3 release version to deploy, e.g. 1.6.0'
        required: true
        type: string

jobs:
  extract:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract_version.outputs.version }}
    steps:
      - id: extract_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=$(echo ${{ github.ref_name }} | sed 's/vite-vue3@//')" >> $GITHUB_OUTPUT
          fi

  build:
    needs: extract
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.extract.outputs.version }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20.19.0

    - name: Setup pnpm
      uses: pnpm/action-setup@v4.0.0
      with:
        version: 9.4.0

    - name: Build Dist
      env:
        VITE_APP_SENTRY_DSN: ${{ secrets.VITE_APP_SENTRY_DSN }}
        VITE_APP_SENTRY_ORG: ${{ secrets.VITE_APP_SENTRY_ORG }}
        VITE_APP_SENTRY_PROJECT: ${{ secrets.VITE_APP_SENTRY_PROJECT }}
        VITE_APP_SENTRY_TOKEN: ${{ secrets.VITE_APP_SENTRY_TOKEN }}
      run: |
        echo "Building vite-vue3 release ${RELEASE_VERSION}"
        pnpm install --frozen-lockfile
        pnpm vite-vue3:build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: vite-vue3-dist-${{ env.RELEASE_VERSION }}
        path: app/vite-vue3/dist
        retention-days: 1

  deploy:
    needs: [extract, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: vite-vue3-dist-${{ needs.extract.outputs.version }}
          path: app/vite-vue3/dist

      - name: Upload to Ali OSS
        uses: cumt-robin/upload-to-alioss-action@v1
        with:
          access_key_id: ${{ secrets.ALI_ACCESS_KEY_ID }}
          access_key_secret: ${{ secrets.ALI_ACCESS_KEY_SECRET }}
          bucket: ${{ secrets.ALI_OSS_BUCKET }}
          region: ${{ secrets.ALI_OSS_REGION }}
          local_dir: app/vite-vue3/dist
